name: Update Wiki Page

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: zhangmengru752-pixel/AA.wiki
          token: ${{ secrets.WIKI_PAT }}
          path: wiki

      - name: Create or update wiki page via GitHub API
        uses: actions/github-script@v6
        with:
          script: |
            const owner = 'zhangmengru752-pixel';
            const repo = 'AA.wiki';
            const path = 'Awesome+线上教育.md';

            // Page content (UTF-8)
            const content = `# Awesome+线上教育

